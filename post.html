<!DOCTYPE html>
<html>
<head>
<title>Blog Post</title>
</head>
<body>

<div id="postContainer"></div>

<script src="js/blog-data.js"></script>
<script>
// 1️⃣ Get post ID from URL
let params = new URLSearchParams(window.location.search);
let id = params.get("id");

// 2️⃣ Find the post
let post = blogPosts.find(p => p.id == id);

// 3️⃣ Check if post exists
if(!post){
    document.getElementById("postContainer").innerHTML = "<h2>Post not found</h2>";
    throw new Error("Post not found");
}

// 4️⃣ Set dynamic title & meta description
document.title = post.title + " | DeemCreations";
let meta = document.createElement("meta");
meta.name = "description";
meta.content = post.description;
document.head.appendChild(meta);

// 5️⃣ Generate post HTML
let html = `
<h1>${post.title}</h1>
<p>${post.date}</p>
<img src="${post.image}" alt="${post.title}">
${post.content}
`;
document.getElementById("postContainer").innerHTML = html;

// 6️⃣ Related posts (same category)
let related = "";
blogPosts.forEach(p => {
    if(p.id != post.id && p.category == post.category){
        related += `<p><a href="post.html?id=${p.id}">${p.title}</a></p>`;
    }
});
document.getElementById("postContainer").innerHTML += `
<h3>Related Posts</h3>
${related}
`;

// 7️⃣ SEO Schema
let schema = `
{
"@context":"https://schema.org",
"@type":"BlogPosting",
"headline":"${post.title}",
"datePublished":"${post.date}",
"author":{
    "@type":"Person",
    "name":"Muhammad Nadeem"
}
}`;
let script = document.createElement("script");
script.type = "application/ld+json";
script.text = schema;
document.head.appendChild(script);
</script>

</body>
</html>
